  <body class="bg-[#050505] text-[#f5f5f5] selection:bg-white selection:text-black">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      // Keep the intersection observer for fade-in animations since we still use the classes
      document.addEventListener('DOMContentLoaded', () => {
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);

        // We need to observe dynamically added elements in React
        const mutationObserver = new MutationObserver((mutations) => {
          mutations.forEach((mutation) => {
            if (mutation.addedNodes.length) {
              document.querySelectorAll('.fade-in-section:not(.is-visible)').forEach(el => {
                  observer.observe(el);
              });
            }
          });
        });
        
        mutationObserver.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </body>
